server {
    listen 3000;

    root /usr/share/nginx/html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_comp_level 9;
    etag on;

    # Proxy API requests to metaflow-ui-backend on Azure
    location /api/ {
        proxy_pass https://metaflow-ui-backend.ashywater-30acecc8.northeurope.azurecontainerapps.io/;
        proxy_set_header Host metaflow-ui-backend.ashywater-30acecc8.northeurope.azurecontainerapps.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_ssl_server_name on;
    }

    # Catch pagination URLs generated by the backend without /api/ prefix
    location /flows/ {
        proxy_pass https://metaflow-ui-backend.ashywater-30acecc8.northeurope.azurecontainerapps.io/flows/;
        proxy_set_header Host metaflow-ui-backend.ashywater-30acecc8.northeurope.azurecontainerapps.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_ssl_server_name on;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /index.html {
        sub_filter_once on;
        sub_filter '</head>' '<script>window.METAFLOW_SERVICE="/api";window.MF_DEFAULT_TIME_FILTER_DAYS="";</script></head>';
        sub_filter '<body>' '<body>';
        sub_filter '</body>' '</body>';
        add_header Cache-Control max-age=300;
    }

    location /static/ {
        add_header Cache-Control max-age=31536000;
    }

    location ~* \.(svg|jpg|jpeg|png|gif|ico|css|js)$ {
        add_header Cache-Control max-age=31536000;
    }
}
